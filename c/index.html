<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constitution Man | The Vault</title>
    <!-- Tailwind for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for the "brain" -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #09090b; }
        .bg-carbon { background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Simplified Lucide Icon Component for CDN usage
        const Icon = ({ name, className }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [email, setEmail] = useState('');
            const [status, setStatus] = useState('idle');

            // --- MANAGER: PASTE YOUR FORMSPREE ID HERE ---
            const FORMSPREE_ID = "YOUR_ID_HERE"; 

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (FORMSPREE_ID === "YOUR_ID_HERE") {
                    alert("Manager: Put your Formspree ID in the code!");
                    return;
                }
                setStatus('loading');
                try {
                    const response = await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, message: "New Vault Subscriber" })
                    });
                    if (response.ok) setStatus('success');
                    else setStatus('error');
                } catch (err) {
                    setStatus('error');
                }
            };

            return (
                <div className="min-h-screen relative overflow-x-hidden selection:bg-red-600 selection:text-white">
                    {/* Background Visuals */}
                    <div className="fixed inset-0 pointer-events-none">
                        <div className="absolute inset-0 bg-[radial-gradient(circle_at_50%_20%,_rgba(185,28,28,0.15),transparent_70%)]"></div>
                        <div className="absolute inset-0 bg-carbon opacity-20"></div>
                    </div>

                    <div className="relative z-10 max-w-5xl mx-auto px-6 py-12 lg:py-20 flex flex-col items-center">
                        
                        {/* Logo Hero */}
                        <div className="relative mb-8 group animate-pulse">
                            <div className="absolute -inset-4 bg-gradient-to-r from-red-600 via-blue-600 to-red-600 rounded-3xl blur-2xl opacity-20 transition duration-1000"></div>
                            <img 
                                src="image.png" 
                                alt="Constitution Man" 
                                className="relative w-full max-w-[450px] rounded-xl shadow-2xl border border-white/10"
                                onError={(e) => { e.target.src = "https://via.placeholder.com/600x400/111111/FFFFFF?text=CONSTITUTION+MAN"; }}
                            />
                        </div>

                        {/* Identity Tags */}
                        <div className="flex flex-wrap justify-center gap-3 mb-12">
                            <span className="px-4 py-1.5 bg-zinc-900 border border-zinc-800 rounded-full text-[10px] font-black uppercase tracking-[0.2em] text-zinc-400">⚪ Calm when respected</span>
                            <span className="px-4 py-1.5 bg-zinc-900 border border-zinc-800 rounded-full text-[10px] font-black uppercase tracking-[0.2em] text-red-500">🔴 Relentless when pushed</span>
                        </div>

                        {/* Headlines */}
                        <div className="text-center mb-16 max-w-3xl">
                            <div className="inline-flex items-center gap-2 px-4 py-1 rounded-full bg-red-600/20 border border-red-600/40 text-red-500 text-[10px] font-black uppercase tracking-widest mb-8">
                                <Icon name="alert-triangle" className="w-4 h-4" />
                                <span>Censorship Bunker Status: ACTIVE</span>
                            </div>
                            <h1 className="text-5xl md:text-7xl font-black mb-8 italic tracking-tighter uppercase leading-[0.85]">
                                ACCOUNTABILITY <br/>
                                <span className="text-red-600">ON CAMERA.</span>
                            </h1>
                            <p className="text-zinc-400 text-lg md:text-xl font-medium max-w-2xl mx-auto">
                                YouTube keeps striking the channel. Join the <span className="text-white font-bold underline decoration-red-600">Digital Bunker</span> to ensure you never lose access to the truth.
                            </p>
                        </div>

                        {/* The Box */}
                        <div className="w-full max-w-lg mb-24">
                            <div className="bg-zinc-900/90 backdrop-blur-xl border border-zinc-800 p-8 md:p-10 rounded-[2.5rem] shadow-2xl relative">
                                {status !== 'success' ? (
                                    <form onSubmit={handleSubmit} className="space-y-6">
                                        <div className="text-center space-y-2 mb-4">
                                            <h3 className="text-2xl font-black italic uppercase tracking-tighter">Enter The Vault</h3>
                                            <p className="text-zinc-500 text-[10px] font-bold uppercase tracking-widest">Get unedited footage & de-escalation tips</p>
                                        </div>
                                        <div className="relative">
                                            <input
                                                type="email"
                                                required
                                                value={email}
                                                onChange={(e) => setEmail(e.target.value)}
                                                placeholder="Your email address..."
                                                className="w-full bg-black/60 border-2 border-zinc-800 rounded-2xl py-5 px-6 text-white text-lg placeholder-zinc-700 focus:outline-none focus:border-red-600 transition-all"
                                            />
                                        </div>
                                        <button className="w-full py-5 rounded-2xl text-xl font-black uppercase tracking-widest bg-red-600 hover:bg-red-700 text-white shadow-lg transition-transform active:scale-95">
                                            {status === 'loading' ? 'Securing...' : 'Join The Army'}
                                        </button>
                                        <div className="flex justify-center gap-4 opacity-50">
                                            <span className="text-[10px] font-bold uppercase tracking-tighter"><Icon name="lock" className="w-3 h-3 inline mr-1"/> Secure</span>
                                            <span className="text-[10px] font-bold uppercase tracking-tighter"><Icon name="shield-check" className="w-3 h-3 inline mr-1"/> Protected</span>
                                        </div>
                                    </form>
                                ) : (
                                    <div className="text-center py-6">
                                        <div className="w-20 h-20 bg-green-500/10 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
                                            <Icon name="check-circle-2" className="w-10 h-10" />
                                        </div>
                                        <h3 className="text-3xl font-black uppercase italic tracking-tighter">Bunker Secured</h3>
                                        <p className="text-zinc-400 mt-2">You're in. Stand by for the first drop.</p>
                                        <button onClick={() => setStatus('idle')} className="mt-8 text-zinc-600 underline text-xs font-bold uppercase tracking-widest">Add Another Patriot</button>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Pillars */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-4xl text-center md:text-left">
                            {[
                                { icon: "gavel", title: "Education", text: "Knowing your rights is your best defense. We break it down." },
                                { icon: "shield", title: "No Permission", text: "Justice doesn't ask. We stand our ground every time." },
                                { icon: "users", title: "The Army", text: "Join the accountability generation. We are growing daily." }
                            ].map((item, idx) => (
                                <div key={idx} className="bg-zinc-900/40 border border-zinc-800 p-8 rounded-3xl">
                                    <Icon name={item.icon} className="w-10 h-10 text-red-600 mb-4 mx-auto md:mx-0" />
                                    <h4 className="text-lg font-black uppercase italic text-white mb-2 tracking-tighter">{item.title}</h4>
                                    <p className="text-zinc-500 text-sm leading-relaxed">{item.text}</p>
                                </div>
                            ))}
                        </div>

                        <footer className="mt-32 pt-12 border-t border-zinc-900 w-full text-center">
                            <div className="flex justify-center gap-8 mb-8 text-zinc-500 font-black text-[10px] uppercase tracking-widest">
                                <a href="#" className="hover:text-white transition-colors">Rumble</a>
                                <a href="#" className="hover:text-white transition-colors">Twitter / X</a>
                                <a href="https://www.youtube.com/@ConstitutionMan" className="hover:text-white transition-colors">YouTube</a>
                            </div>
                            <p className="text-[10px] text-zinc-800 font-black tracking-[0.4em] uppercase italic">&copy; 2026 Constitution Man Media</p>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
